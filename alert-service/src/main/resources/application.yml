server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: alert-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:55432/realrisk}
    username: ${DB_USER:realrisk}
    password: ${DB_PASSWORD:realrisk}
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 50ms
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
      rule.service.loader.enable: false
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

realrisk:
  alert:
    topic: ${ALERT_EVENTS_TOPIC:alert-events}
    dlq-topic: ${ALERT_DLQ_TOPIC:alert-events-dlq}
    consumer-group: ${ALERT_CONSUMER_GROUP:alert-service}
    rate-limit-window: ${ALERT_RATE_LIMIT_WINDOW:15m}
    retry-backoff: ${ALERT_RETRY_BACKOFF_MS:1000}ms
    max-retries: ${ALERT_MAX_RETRIES:2}
    routing:
      MEDIUM: [email]
      HIGH: [email, sms]
      CRITICAL: [email, sms, push]
