server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: realrisk
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:55432/realrisk}
    username: ${DB_USER:realrisk}
    password: ${DB_PASSWORD:realrisk}
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 50ms
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

realrisk:
  risk-worker:
    enabled: ${RISK_WORKER_ENABLED:true}
  topics:
    raw-events: raw-events
    rule-updates: rule-updates
    raw-audit: raw-audit
    decision-audit: decision-audit
    high-risk-events: high-risk-events
    alert-events: alert-events
  rate-limit:
    window-ms: ${RISK_WINDOW_MS:60000}
    limit: ${RISK_LIMIT:5}
