name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/realrisk-api
  ALERT_IMAGE: ghcr.io/${{ github.repository_owner }}/realrisk-alert-service
  FLINK_IMAGE: ghcr.io/${{ github.repository_owner }}/realrisk-flink
  DEPLOY_OVERLAY: k8s/overlays/local

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify root module
        run: mvn -B verify

      - name: Verify alert-service module
        run: mvn -B -f ./alert-service/pom.xml verify

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compute image tags
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Package application jars
        run: |
          mvn -B -DskipTests package
          mvn -B -f ./alert-service/pom.xml -DskipTests package
          mvn -B -f ./flink-job/pom.xml -DskipTests package

      - name: Build API Gateway image
        run: |
          docker build \
            -f ./Dockerfile.api-gateway \
            -t "$API_IMAGE:$SHORT_SHA" \
            -t "$API_IMAGE:latest" \
            .

      - name: Build Alert Service image
        run: |
          docker build \
            -f ./alert-service/Dockerfile \
            -t "$ALERT_IMAGE:$SHORT_SHA" \
            -t "$ALERT_IMAGE:latest" \
            ./alert-service

      - name: Build Flink image
        run: |
          docker build \
            -f ./flink-job/Dockerfile \
            -t "$FLINK_IMAGE:$SHORT_SHA" \
            -t "$FLINK_IMAGE:latest" \
            ./flink-job

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Push API Gateway image
        if: github.event_name == 'push'
        run: |
          docker push "$API_IMAGE:$SHORT_SHA"
          docker push "$API_IMAGE:latest"

      - name: Push Alert Service image
        if: github.event_name == 'push'
        run: |
          docker push "$ALERT_IMAGE:$SHORT_SHA"
          docker push "$ALERT_IMAGE:latest"

      - name: Push Flink image
        if: github.event_name == 'push'
        run: |
          docker push "$FLINK_IMAGE:$SHORT_SHA"
          docker push "$FLINK_IMAGE:latest"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.0

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBE_CONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Inject SHA-tagged images into overlay
        run: |
          sed -i "s#image: realrisk-api:.*#image: $API_IMAGE:$SHORT_SHA#" "$DEPLOY_OVERLAY/api-gateway-deployment-patch.yaml"
          sed -i "s#image: realrisk-alert-service:.*#image: $ALERT_IMAGE:$SHORT_SHA#" "$DEPLOY_OVERLAY/alert-service-deployment-patch.yaml"
          sed -i "s#image: realrisk-flink:.*#image: $FLINK_IMAGE:$SHORT_SHA#" "$DEPLOY_OVERLAY/flink-deployment-patch.yaml"

      - name: Apply selected overlay
        run: kubectl apply -k "./$DEPLOY_OVERLAY"

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/realrisk-api-gateway -n realrisk --timeout=300s
          kubectl rollout status deployment/realrisk-alert-service -n realrisk --timeout=300s
          kubectl wait --for=condition=Ready flinkdeployment/realrisk-flink -n realrisk --timeout=300s
