apiVersion: v1
kind: ConfigMap
metadata:
  name: realrisk-alert-service-config
data:
  DB_URL: jdbc:postgresql://realrisk-cluster-rw.realrisk.svc.cluster.local:5432/realrisk
  REDIS_SENTINEL_MASTER: mymaster
  REDIS_SENTINEL_NODES: realrisk-redis-node-0.realrisk-redis-headless.realrisk.svc.cluster.local:26379,realrisk-redis-node-1.realrisk-redis-headless.realrisk.svc.cluster.local:26379,realrisk-redis-node-2.realrisk-redis-headless.realrisk.svc.cluster.local:26379
  KAFKA_BOOTSTRAP_SERVERS: realrisk-kafka-kafka-bootstrap.realrisk.svc.cluster.local:9092
  SCHEMA_REGISTRY_URL: http://realrisk-schema-registry.realrisk.svc.cluster.local:8081
  ALERT_DLQ_TOPIC: alert-events-dlq
  ALERT_MAX_RETRIES: "2"
  ALERT_RETRY_BACKOFF_MS: "1000"
  SMTP_HOST: smtp.invalid
  SMTP_PORT: "1025"
  NOTIFICATION_EMAIL_ENABLED: "true"
  NOTIFICATION_SLACK_ENABLED: "true"
