apiVersion: apps/v1
kind: Deployment
metadata:
  name: realrisk-schema-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: realrisk-schema-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: realrisk-schema-registry
    spec:
      containers:
        - name: schema-registry
          image: confluentinc/cp-schema-registry:7.7.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              value: realrisk-schema-registry
            - name: SCHEMA_REGISTRY_LISTENERS
              value: http://0.0.0.0:8081
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: realrisk-kafka-kafka-bootstrap:9092
            - name: SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL
              value: PLAINTEXT
          readinessProbe:
            httpGet:
              path: /subjects
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /subjects
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 512Mi
