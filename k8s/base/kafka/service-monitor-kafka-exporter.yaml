apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: realrisk-kafka-exporter
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      strimzi.io/cluster: realrisk-kafka
      strimzi.io/name: realrisk-kafka-kafka-exporter
  namespaceSelector:
    matchNames:
      - realrisk
  endpoints:
    - port: tcp-prometheus
      interval: 15s
      path: /metrics
