apiVersion: apps/v1
kind: Deployment
metadata:
  name: realrisk-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: realrisk-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: realrisk-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-04-22T22-12-26Z
          args:
            - server
            - /data
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: realrisk-minio-credentials
                  key: accessKey
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: realrisk-minio-credentials
                  key: secretKey
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: realrisk-minio-data
