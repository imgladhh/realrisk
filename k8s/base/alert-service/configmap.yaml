apiVersion: v1
kind: ConfigMap
metadata:
  name: realrisk-alert-service-config
data:
  SERVER_PORT: "8080"
  DB_URL: jdbc:postgresql://postgres.invalid:5432/realrisk
  SPRING_DATA_REDIS_SENTINEL_MASTER: mymaster
  SPRING_DATA_REDIS_SENTINEL_NODES: redis.invalid:26379
  KAFKA_BOOTSTRAP_SERVERS: kafka.invalid:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.invalid:8081
  ALERT_EVENTS_TOPIC: alert-events
  ALERT_CONSUMER_GROUP: alert-service
  ALERT_RATE_LIMIT_WINDOW: 15m
  ALERT_DLQ_TOPIC: alert-events-dlq
  ALERT_MAX_RETRIES: "2"
  ALERT_RETRY_BACKOFF_MS: "1000"
  SMTP_HOST: localhost
  SMTP_PORT: "587"
  NOTIFICATION_EMAIL_ENABLED: "true"
  NOTIFICATION_SLACK_ENABLED: "true"
