apiVersion: apps/v1
kind: Deployment
metadata:
  name: realrisk-alert-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: realrisk-alert-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: realrisk-alert-service
    spec:
      containers:
        - name: alert-service
          image: realrisk-alert-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: realrisk-alert-service-config
            - secretRef:
                name: realrisk-app-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 150m
              memory: 320Mi
            limits:
              cpu: 1000m
              memory: 640Mi
