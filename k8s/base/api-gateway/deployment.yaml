apiVersion: apps/v1
kind: Deployment
metadata:
  name: realrisk-api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: realrisk-api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: realrisk-api-gateway
    spec:
      containers:
        - name: api-gateway
          image: realrisk-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: realrisk-api-gateway-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: realrisk-cluster-app
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: realrisk-cluster-app
                  key: password
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 768Mi
