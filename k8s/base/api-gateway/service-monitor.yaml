apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: realrisk-api-gateway
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: realrisk-api-gateway
  namespaceSelector:
    matchNames:
      - realrisk
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
