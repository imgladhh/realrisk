apiVersion: v1
kind: ConfigMap
metadata:
  name: realrisk-flink-config
data:
  KAFKA_BOOTSTRAP_SERVERS: kafka.invalid:9092
  SCHEMA_REGISTRY_URL: http://schema-registry.invalid:8081
  REDIS_HOST: redis.invalid
  REDIS_PORT: "6379"
  RAW_EVENTS_TOPIC: raw-events
  RULE_UPDATES_TOPIC: rule-updates
  DECISION_AUDIT_TOPIC: decision-audit
  HIGH_RISK_EVENTS_TOPIC: high-risk-events
  ALERT_EVENTS_TOPIC: alert-events
  FLINK_CHECKPOINTS_DIR: s3://realrisk-flink/checkpoints
  FLINK_PARALLELISM: "2"
  FLINK_LARGE_AMOUNT_CENTS: "1000000"
  FLINK_REVIEW_THRESHOLD: "60"
  FLINK_BLOCK_THRESHOLD: "80"
  FLINK_HIGH_RISK_THRESHOLD: "85"
  FLINK_ALERT_THRESHOLD: "90"
  FLINK_MERCHANT_BURST_THRESHOLD: "10"
  FLINK_VELOCITY_THRESHOLD_7D: "100"
  FLINK_HIGH_VELOCITY_SCORE: "40"
  FLINK_MERCHANT_BURST_WINDOW_MS: "300000"
  FLINK_WATERMARK_SKEW_MS: "5000"
