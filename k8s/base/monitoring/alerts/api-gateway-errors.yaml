apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: realrisk-api-gateway-errors
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: realrisk.api-gateway
      rules:
        - alert: ApiGatewayHighErrorRate
          expr: |
            (
              sum(rate(http_server_requests_seconds_count{namespace="realrisk",application="realrisk",status=~"5.."}[5m]))
              /
              clamp_min(sum(rate(http_server_requests_seconds_count{namespace="realrisk",application="realrisk"}[5m])), 0.001)
            ) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: API Gateway 5xx rate is elevated
            description: More than 5% of API Gateway requests have returned 5xx over the last 5 minutes.
